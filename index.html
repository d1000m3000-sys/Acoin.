<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Acoin Wallet</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="logo">
    <div class="glow"></div>
    <h1>ACOIN</h1>
    <p class="tag">Private Digital Asset Layer</p>
  </div>

  <div class="card">
    <h2>Wallet</h2>
    <p class="addr">0x000...ACN</p>

    <div class="balance">
      <h3>Balance</h3>
      <h1>0.00 ACN</h1>
    </div>
  </div>

  <div class="actions">
    <button>Send</button>
    <button>Receive</button>
    <button>Swap</button>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
